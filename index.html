<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#071428" />
  <title>Neo Calculator</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="scene">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>

    <main class="shell" aria-label="계산기">
      <header class="topbar">
        <div class="brand-wrap">
          <div class="eyebrow">FUTURE INTERFACE</div>
          <h1 class="brand">Neo Calculator</h1>
        </div>
        <div class="status-pill" aria-label="상태">ONLINE</div>
      </header>

      <section class="display-panel" aria-live="polite">
        <div class="display-top" id="expression">0</div>
        <div class="display-main" id="display">0</div>
        <div class="display-bottom">
          <span id="modeLabel">STANDARD MODE</span>
          <span id="hintLabel">C로 초기화</span>
        </div>
      </section>

      <section class="keypad" aria-label="키패드">
        <button class="key key-danger" data-action="clear">C</button>
        <button class="key" data-action="sign">±</button>
        <button class="key" data-action="percent">%</button>
        <button class="key key-operator" data-value="÷">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key key-operator" data-value="×">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key key-operator" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key key-operator" data-value="+">+</button>

        <button class="key key-zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key key-operator key-equals" data-action="equals">=</button>
      </section>

      <footer class="footerline">
        <span>Glass Neon Theme</span>
        <span>Keyboard Ready</span>
      </footer>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
